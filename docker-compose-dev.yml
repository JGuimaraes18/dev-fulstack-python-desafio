services:
  nginx:
    image: nginx:alpine
    container_name: sales_nginx_dev
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/staticfiles
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started 
    networks:
      - net_sales_dev

  db:
    image: postgres:16-alpine
    container_name: sales_db_dev
    restart: always
    networks:
      - net_sales_dev
    env_file:
      - .env_dev
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d spassu"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: sales_backend_dev
    entrypoint: []
    command: sh -c "python manage.py collectstatic --noinput && python manage.py runserver 0.0.0.0:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env_dev
    networks:
      - net_sales_dev
    volumes:
      - ./backend:/app
      - static_volume:/staticfiles
    healthcheck:
      test: ["CMD-SHELL", "wget --spider http://127.0.0.1:8000/admin/login/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: sales_frontend_dev
    networks:
      - net_sales_dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true

networks:
  net_sales_dev:
    driver: bridge

volumes:
  static_volume:
  frontend_node_modules: